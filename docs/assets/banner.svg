  <g font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="16" font-weight="700">
    <rect x="238" y="230" width="150" height="38" rx="19" fill="#ffffff" opacity="0.12"/>
    <text x="258" y="254" fill="#ffffff">🔥 Streaks</text>

    <rect x="398" y="230" width="150" height="38" rx="19" fill="#ffffff" opacity="0.12"/>
    <text x="418" y="254" fill="#ffffff">🧩 8 Games</text>

    <rect x="558" y="230" width="170" height="38" rx="19" fill="#ffffff" opacity="0.12"/>
    <text x="578" y="254" fill="#ffffff">👥 Social</text>

    <rect x="738" y="230" width="170" height="38" rx="19" fill="#ffffff" opacity="0.12"/>
    <text x="758" y="254" fill="#ffffff">📱 PWA-ready</text>
