{% extends "base.html" %}
{% block content %}
<div style="padding:16px;">
  <h1 class="font-display" style="font-size:22px;margin-bottom:12px;">📖 Dictionary</h1>
  <form method="get">
    <input type="text" name="q" value="{{ q }}" placeholder="Search words..." style="width:100%;padding:12px 14px;border-radius:12px;border:2px solid var(--ink-100);">
  </form>
</div>
<div style="padding:0 16px;display:flex;flex-direction:column;gap:8px;">
  {% for word in words %}
  <a href="{% url 'games:word_history' word_id=word.id %}" class="card card-pad" style="display:flex;justify-content:space-between;align-items:center;">
    <div>
      <div style="font-weight:800;">{{ word.text }}</div>
      <div class="muted" style="font-size:13px;">{{ word.definition|truncatechars:60 }}</div>
    </div>
    <span class="muted">›</span>
  </a>
  {% empty %}<p class="muted">No words found.</p>{% endfor %}
</div>
{% endblock %}
