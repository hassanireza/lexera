{% extends "base.html" %}
{% block content %}
<div class="game-screen">
  <div style="display:flex;align-items:center;gap:10px;">
    <a href="{% url 'core:dashboard' %}" class="btn-ghost" style="font-size:22px;">✕</a>
    <div class="section-title" style="margin:0;flex:1;text-align:center;">Word Sudoku</div>
    <div style="width:22px;"></div>
  </div>
  <p class="muted" style="text-align:center;font-size:13px;">Fill the grid using only the letters of <strong>{{ bank_word }}</strong> — each letter appears once per row, column and 3×3 box.</p>

  <div style="display:flex;justify-content:center;gap:6px;flex-wrap:wrap;">
    {% for l in letters %}<span class="stat-chip" style="min-width:28px;justify-content:center;">{{ l }}</span>{% endfor %}
  </div>

  <div id="grid" class="sudoku-grid"></div>

  <button id="checkBtn" class="btn btn-primary btn-block">Check grid</button>
  <p id="statusText" class="muted" style="text-align:center;font-size:13px;"></p>
</div>

<script>
const PUZZLE = {{ puzzle_json|safe }};
const LETTERS = {{ letters_json|safe }};
const LESSON_ID = {{ lesson.id }};
const grid = document.getElementById('grid');
let mistakesMade = 0;

for (let r = 0; r < 9; r++) {
  for (let c = 0; c < 9; c++) {
    const cell = document.createElement('div');
    cell.className = 'sudoku-cell';
    if ((c + 1) % 3 === 0 && c !== 8) cell.classList.add('block-r');
    if ((r + 1) % 3 === 0 && r !== 8) cell.classList.add('block-b');
    const val = PUZZLE[r][c];
    if (val) {
      cell.classList.add('given');
      cell.textContent = val;
    } else {
      const input = document.createElement('input');
      input.maxLength = 1;
      input.id = `sc-${r}-${c}`;
      input.addEventListener('input', e => { e.target.value = e.target.value.toUpperCase().replace(/[^A-Z]/g, ''); });
      cell.appendChild(input);
    }
    grid.appendChild(cell);
  }
}

document.getElementById('checkBtn').onclick = async () => {
  const gridVals = [];
  for (let r = 0; r < 9; r++) {
    const row = [];
    for (let c = 0; c < 9; c++) {
      const given = PUZZLE[r][c];
      if (given) { row.push(given); continue; }
      const input = document.getElementById(`sc-${r}-${c}`);
      row.push(input.value || '');
    }
    gridVals.push(row);
  }
  const res = await postJSON(`/play/sudoku/${LESSON_ID}/check/`, { grid: gridVals });
  document.querySelectorAll('.sudoku-cell.error').forEach(c => c.classList.remove('error'));
  res.errors.forEach(([r, c]) => {
    const cellIdx = r * 9 + c;
    grid.children[cellIdx].classList.add('error');
  });
  if (res.complete) {
    document.getElementById('statusText').textContent = 'Solved! 🎉';
    const scorePct = 100;
    setTimeout(() => lexeraFinishLesson(LESSON_ID, scorePct, "{% url 'core:dashboard' %}"), 500);
  } else {
    mistakesMade++;
    document.getElementById('statusText').textContent = `Not quite — ${res.errors.length} cell(s) need fixing.`;
    if (mistakesMade >= 2) postJSON('/play/lose-life/', {});
  }
};
</script>
{% endblock %}
