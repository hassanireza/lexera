{% extends "base.html" %}
{% block content %}
<div style="padding:20px;">
  <h1 class="font-display" style="font-size:22px;margin-bottom:16px;">Settings</h1>
  <form method="post" style="display:flex;flex-direction:column;gap:14px;">
    {% csrf_token %}
    <div>
      <label style="font-weight:700;font-size:13px;">Choose your avatar</label>
      <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;">
        {% for key, emoji in avatar_choices %}
          <label style="cursor:pointer;">
            <input type="radio" name="avatar_key" value="{{ key }}" {% if user.avatar_key == key %}checked{% endif %} style="display:none;">
            <span class="avatar-circle" style="border:2px solid {% if user.avatar_key == key %}var(--indigo-600){% else %}transparent{% endif %};">{{ emoji }}</span>
          </label>
        {% endfor %}
      </div>
    </div>
    {% for field in form %}
      {% if field.name != 'avatar_key' %}
      <div>
        <label style="font-weight:700;font-size:13px;display:block;margin-bottom:4px;">{{ field.label }}</label>
        {{ field }}
      </div>
      {% endif %}
    {% endfor %}
    <button class="btn btn-primary btn-block">Save changes</button>
  </form>
</div>
<style>
input[type=text], input[type=date], input[type=number], textarea{
  width:100%; padding:12px 14px; border-radius:12px; border:2px solid var(--ink-100); font-size:15px; font-family:inherit;
}
</style>
{% endblock %}
