{% extends "base.html" %}
{% block content %}
<div style="padding:32px 24px;">
  <h1 class="font-display" style="font-size:26px;">Create your account</h1>
  <p class="muted" style="margin-bottom:20px;">Start your streak today.</p>
  <form method="post" style="display:flex;flex-direction:column;gap:12px;">
    {% csrf_token %}
    {% for field in form %}
      <div>
        <label style="font-weight:700;font-size:13px;display:block;margin-bottom:4px;">{{ field.label }}</label>
        {{ field }}
        {% if field.errors %}<div style="color:var(--ruby-600);font-size:12px;margin-top:4px;">{{ field.errors|striptags }}</div>{% endif %}
      </div>
    {% endfor %}
    <button class="btn btn-primary btn-block" style="margin-top:8px;">Create account 🚀</button>
  </form>
  <p style="text-align:center;margin-top:16px;" class="muted">Already have an account? <a href="{% url 'accounts:login' %}" style="color:var(--indigo-600);font-weight:700;">Log in</a></p>
</div>
<style>
input, select {
  width:100%; padding:12px 14px; border-radius:12px; border:2px solid var(--ink-100); font-size:15px; font-family:inherit;
}
input:focus, select:focus{outline:none; border-color:var(--indigo-500);}
</style>
{% endblock %}
