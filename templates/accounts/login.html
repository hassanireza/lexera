{% extends "base.html" %}
{% block content %}
<div style="padding:32px 24px;">
  <h1 class="font-display" style="font-size:26px;">Welcome back</h1>
  <p class="muted" style="margin-bottom:20px;">Your streak is waiting for you.</p>
  <form method="post" style="display:flex;flex-direction:column;gap:12px;">
    {% csrf_token %}
    {% for field in form %}
      <div>
        <label style="font-weight:700;font-size:13px;display:block;margin-bottom:4px;">{{ field.label }}</label>
        {{ field }}
        {% if field.errors %}<div style="color:var(--ruby-600);font-size:12px;margin-top:4px;">{{ field.errors|striptags }}</div>{% endif %}
      </div>
    {% endfor %}
    <button class="btn btn-primary btn-block" style="margin-top:8px;">Log in</button>
  </form>
  <p style="text-align:center;margin-top:16px;" class="muted">New to Lexera? <a href="{% url 'accounts:signup' %}" style="color:var(--indigo-600);font-weight:700;">Sign up</a></p>
</div>
<style>
input{ width:100%; padding:12px 14px; border-radius:12px; border:2px solid var(--ink-100); font-size:15px; font-family:inherit;}
input:focus{outline:none; border-color:var(--indigo-500);}
</style>
{% endblock %}
